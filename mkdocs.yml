site_name: Engineering Playbook System
site_description: 工程標準系統 — 以 GitHub 為核心的 SSOT 平台
site_url: https://hank3160-ux.github.io/engineering-playbook-system
repo_url: https://github.com/hank3160-ux/engineering-playbook-system
repo_name: engineering-playbook-system

theme:
  name: material
  language: zh-TW
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy

nav:
  - Home: README.md
  - Playbook:
      - Standard Workflow: playbook/01-standard-workflow.md
      - Architecture & Quality: playbook/02-architecture-and-quality.md
      - Observability & Security: playbook/03-observability-and-security.md
      - Technical Decisions: playbook/04-technical-decisions.md
      - Reliability Checklist: playbook/05-reliability-checklist.md
  - ADR:
      - ADR-001 Layered Architecture: playbook/adr/ADR-001-layered-architecture.md
      - ADR-002 Async Database: playbook/adr/ADR-002-async-database.md
      - ADR-003 CI/CD Design: playbook/adr/ADR-003-cicd-design.md
  - Guides:
      - How to Extend: docs/how-to-extend.md
  - Contributing: CONTRIBUTING.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - tables
