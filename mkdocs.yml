site_name: Engineering Playbook System
use_directory_urls: true
theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top

markdown_extensions:
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js

nav:
  - Home: index.md
  - Playbook: 
      - 總覽: playbook/index.md
      - 標準流程: playbook/01-standard-workflow.md
      - 架構品質: playbook/02-architecture-and-quality.md
      - 可觀測性與資安: playbook/03-observability-and-security.md
      - 技術決策: playbook/04-technical-decisions.md
      - 可靠性清單: playbook/05-reliability-checklist.md
  - ADR:
      - 紀錄總覽: playbook/adr/index.md
      - ADR-001: playbook/adr/ADR-001-layered-architecture.md
      - ADR-002: playbook/adr/ADR-002-async-database.md
      - ADR-003: playbook/adr/ADR-003-cicd-design.md
  - Guides: how-to-extend.md
  - Contributing: contributing/index.md