name: Bug Report
description: 回報一個可重現的問題
title: "[Bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        感謝你回報問題。請盡量填寫完整，有助於我們快速定位與修復。

  - type: textarea
    id: description
    attributes:
      label: 問題描述
      description: 清楚描述發生了什麼事
      placeholder: 當我執行 ... 時，發生了 ...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 重現步驟
      description: 逐步說明如何重現此問題
      placeholder: |
        1. 執行 `uvicorn demo.main:app`
        2. 呼叫 `GET /health`
        3. 觀察到 ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 預期行為
      placeholder: 我預期應該看到 ...
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 實際行為
      placeholder: 實際上看到的是 ...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: 環境資訊
      description: Python 版本、OS、相關套件版本
      placeholder: |
        - OS: Windows 11 / macOS 14 / Ubuntu 22.04
        - Python: 3.11.x
        - FastAPI: 0.110.0
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 相關 Log 或截圖
      description: 貼上錯誤訊息或截圖（可選）
      render: shell

  - type: checkboxes
    id: checklist
    attributes:
      label: 提交前確認
      options:
        - label: 我已搜尋過現有 Issues，確認此問題尚未被回報
          required: true
        - label: 我已確認此問題可在最新版本重現
          required: true
